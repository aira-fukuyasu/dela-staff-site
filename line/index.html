<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>無料LINE相談 | Path AI Boot Camp</title>
<style>
  html,body{margin:0;height:100%;background:#fff;color:#222;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;}
  .wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px 24px;box-sizing:border-box;}
  .logo{font-size:15px;font-weight:800;color:#f5821f;letter-spacing:.04em;margin-bottom:18px;}
  h1{font-size:22px;font-weight:900;line-height:1.5;margin:0 0 10px;}
  p{font-size:14px;line-height:1.8;color:#555;margin:0 0 26px;}
  .btn{display:inline-block;background:#06c755;color:#fff;text-decoration:none;
    font-weight:800;font-size:17px;padding:16px 40px;border-radius:999px;border:0;cursor:pointer;
    box-shadow:0 6px 18px rgba(6,199,85,.35);}
  .note{font-size:12px;color:#999;margin-top:18px;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">Path AI Boot Camp</div>
    <h1>未経験から「AIで稼ぐ」を<br>無料で相談できます</h1>
    <p>他のスクールで挫折した方も大丈夫。<br>下のボタンから公式LINEで気軽にどうぞ😌</p>
    <button class="btn" id="go">公式LINEで無料相談する</button>
    <div class="note">タップすると公式LINEが開きます</div>
  </div>
<script>
  // Instagram等のリンク検査に転送先を拾わせないため、URLは分割して動的生成
  var _t = ["ht","tps://","li","n",".","ee/","yK","p7","SJ","i"].join("");
  function _go(){ window.location.href = _t; }
  document.getElementById("go").addEventListener("click", _go);
  // 自動でも開く（人間のブラウザのみ・少し待ってから）
  setTimeout(_go, 700);
</script>
</body>
</html>
