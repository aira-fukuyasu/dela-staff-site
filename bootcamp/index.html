<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Path AI Boot Camp | マンツーマンAI副業スクール</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;}
body{
  background:#ffffff;
  color:#111111;
  font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP',sans-serif;
  line-height:1.7;
  max-width:480px;
  margin:0 auto;
  overflow-x:hidden;
  padding-bottom:80px;
}
img{max-width:100%;display:block;}
a{color:inherit;text-decoration:none;}

:root{
  --orange:#ff6200;
  --orange2:#ff8c00;
  --g:linear-gradient(135deg,#ff6200,#ff8c00);
  --gh:linear-gradient(90deg,#ff6200,#ff8c00);
  --card:#ffffff;
  --border:rgba(255,98,0,0.28);
}

.gt{background:var(--g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* ====== BUTTONS ====== */
.btn-line{
  display:flex;align-items:center;justify-content:center;gap:12px;
  background:linear-gradient(90deg,#ff3500,#ff9500);
  color:#fff;font-size:18px;font-weight:900;
  padding:17px 28px;border-radius:50px;width:100%;border:none;
  cursor:pointer;text-decoration:none;letter-spacing:.02em;
  box-shadow:0 6px 0 rgba(180,40,0,.2),0 10px 28px rgba(255,80,0,.3);
}
.btn-line-green{
  background:linear-gradient(90deg,#ff3500,#ff9500);
  box-shadow:0 6px 0 rgba(180,40,0,.2),0 10px 28px rgba(255,80,0,.3);
}
.btn-check{
  width:28px;height:28px;background:#fff;border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}

/* ====== HERO ====== */
.hero{
  background:#ffffff;
  min-height:520px;
  padding:0 20px;
  position:relative;overflow:hidden;
  text-align:center;
  display:flex;align-items:center;justify-content:center;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,98,0,.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,98,0,.05) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;
}
.hero-frame{
  position:absolute;inset:10px;
  border:1.5px solid rgba(255,98,0,.3);
  clip-path:polygon(18px 0%,calc(100% - 18px) 0%,100% 18px,100% calc(100% - 18px),calc(100% - 18px) 100%,18px 100%,0% calc(100% - 18px),0% 18px);
  pointer-events:none;z-index:2;
}
.hero-corner{position:absolute;pointer-events:none;z-index:3;display:block;}
.hero-corner-tl{top:0;left:0;}
.hero-corner-tr{top:0;right:0;}
.hero-corner-bl{bottom:0;left:0;}
.hero-corner-br{bottom:0;right:0;}
.hero-inner{position:relative;z-index:4;padding:64px 10px;}
.hero-tagline{
  font-size:17px;font-weight:700;
  color:var(--orange);letter-spacing:.07em;
  margin-bottom:18px;
}
.hero-brand{
  font-style:italic;color:#111;
  font-size:clamp(62px,19vw,90px);
  font-weight:900;line-height:1;letter-spacing:-.02em;
}
.brand-ai{color:var(--orange);}

/* ====== LINE MID CTA ====== */
@keyframes lineglow{
  0%,100%{box-shadow:0 4px 20px rgba(6,199,85,.4);}
  50%{box-shadow:0 6px 32px rgba(6,199,85,.75),0 0 0 6px rgba(6,199,85,.15);}
}
.line-mid-cta{background:#ffffff;padding:4px 20px 36px;text-align:center;}
.line-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:#06C755;color:#fff;
  font-size:14px;font-weight:900;letter-spacing:.02em;
  padding:9px 16px;border-radius:50px;
  text-decoration:none;width:100%;box-sizing:border-box;
  animation:lineglow 2s ease-in-out infinite;
  transition:opacity .15s;
}
.line-btn:active{opacity:.85;}
.line-btn svg{flex-shrink:0;}
.line-icon-badge{
  display:inline-flex;align-items:center;justify-content:center;
  background:#fff;border-radius:6px;
  width:26px;height:26px;flex-shrink:0;
}
.line-mid-note{font-size:11px;color:rgba(0,0,0,.4);margin-top:10px;}

/* ====== CTA BLOCK ====== */
.cta-wrap{background:#f5f5f5;padding:28px 20px;}
.cta-box{background:#fff;border-radius:16px;padding:28px 20px;border:1px solid rgba(255,98,0,.15);}
.cta-lead{font-size:15px;color:#333;text-align:center;line-height:1.7;margin-bottom:20px;}
.cta-lead strong{color:var(--orange);text-decoration:underline;}
.cta-notes{font-size:11px;color:#999;margin-top:16px;line-height:2;}

/* ====== LEARN ====== */
.learn{background:#ffffff;padding:48px 20px;}
.sec-title{font-size:26px;font-weight:900;text-align:center;line-height:1.35;margin-bottom:28px;color:#111;}
.learn-box{
  background:#fff;border:1px solid var(--border);
  border-radius:16px;padding:20px 18px;position:relative;overflow:hidden;
  box-shadow:0 2px 12px rgba(255,98,0,.06);
}
.learn-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--g);}
.learn-box::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--gh);}
.learn-item{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid rgba(255,98,0,.1);}
.learn-item:last-child{border-bottom:none;}
.lcheck{
  width:24px;height:24px;flex-shrink:0;
  background:var(--g);border-radius:50%;color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:900;margin-top:1px;
}
.ltext{font-size:14px;line-height:1.65;color:#333;}
.ltext strong{background:var(--g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:900;font-size:15px;}

/* ====== PROBLEM ====== */
.problem{padding:0;background:#fff;line-height:0;}
.problem-card{
  background:#fff;position:relative;
  border:1.5px solid rgba(255,98,0,.5);
  padding:28px 16px 24px;
}
.pcorner{position:absolute;width:14px;height:14px;background:var(--orange);}
.pcorner-tl{top:-1px;left:-1px;}
.pcorner-tr{top:-1px;right:-1px;}
.pcorner-bl{bottom:-1px;left:-1px;}
.pcorner-br{bottom:-1px;right:-1px;}
.problem-eyebrow{font-size:12px;color:rgba(0,0,0,.5);text-align:center;margin-bottom:6px;letter-spacing:.05em;}
.problem-arrow{text-align:center;color:var(--orange);font-size:16px;margin-bottom:6px;line-height:1;}
.problem-kw{
  font-size:clamp(56px,16vw,68px);font-weight:900;
  color:var(--orange);text-align:center;display:block;
  line-height:1;letter-spacing:-.02em;margin-bottom:4px;
}
.problem-sub{font-size:22px;font-weight:900;text-align:center;color:#111;line-height:1.4;margin-bottom:0;}
.problem-slash-row{
  display:flex;align-items:center;justify-content:center;
  gap:8px;margin:12px 0;
}
.problem-slash-row .slashes{color:var(--orange);font-weight:900;font-style:italic;font-size:16px;opacity:.8;letter-spacing:2px;}
.problem-slash-row .slash-label{
  background:var(--orange);color:#fff;
  font-size:13px;font-weight:700;padding:3px 16px;
  clip-path:polygon(10px 0,100% 0,calc(100% - 10px) 100%,0 100%);
  white-space:nowrap;
}
.problem-rows{border-top:1px dashed rgba(255,98,0,.3);padding-top:14px;margin-top:4px;}
.problem-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px;}
.problem-icon-box{
  width:44px;height:44px;flex-shrink:0;
  border:2px solid var(--orange);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
}
.problem-icon-box.ai-icon{border-radius:50%;font-size:15px;font-weight:900;color:var(--orange);}
.problem-row-txt{font-size:13.5px;line-height:1.75;color:#333;padding-top:4px;}
.problem-row-txt strong{color:var(--orange);font-weight:900;}
.problem-bottom{
  margin-top:14px;
  border:1.5px solid rgba(255,98,0,.45);
  border-radius:4px;padding:14px 12px 18px;text-align:center;
}
.problem-bottom-txt{font-size:13px;line-height:1.85;color:#444;margin-bottom:10px;}
.problem-bottom-txt strong{color:var(--orange);font-weight:900;}
.problem-seikai{display:flex;align-items:center;justify-content:center;gap:4px;}
.problem-seikai-step{font-size:15px;font-weight:900;color:#111;display:block;margin-bottom:4px;}
.seikai-mark{color:var(--orange);font-size:24px;font-weight:900;font-style:italic;}
.seikai-word{font-size:34px;font-weight:900;color:var(--orange);}
.seikai-suf{font-size:20px;font-weight:900;color:#111;}
.photo-ph{
  width:100%;height:200px;
  background:#ececec;
  border:1px solid rgba(255,98,0,.2);border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  color:rgba(0,0,0,.3);font-size:13px;margin-bottom:24px;
}

/* ====== TARGET ====== */
.target{background:#ffffff;padding:48px 20px;}
.target-box{
  background:linear-gradient(135deg,rgba(255,98,0,.07),rgba(255,140,0,.04));
  border:1px solid var(--border);border-radius:16px;padding:22px;margin-top:20px;
}
.target-copy{font-size:15px;line-height:1.95;color:#333;}
.target-copy strong{background:var(--g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:900;}
.target-copy p+p{margin-top:14px;}

/* ====== MISCONCEPTIONS ====== */
.miscon{background:#f8f8f8;padding:48px 20px;}
.miscon-img{
  width:100%;height:200px;
  background:#ececec;
  border:1px solid rgba(255,98,0,.2);border-radius:12px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;padding:16px;margin-bottom:8px;position:relative;
}
.mlabel{
  background:#fff;border:1px solid rgba(255,98,0,.4);
  border-radius:8px;padding:7px 11px;font-size:11px;font-weight:700;
  line-height:1.4;text-align:center;color:#333;
}
.miscon-labels{display:flex;flex-direction:column;gap:8px;align-items:center;width:100%;}

/* ====== REASONS ====== */
.reasons{background:#ffffff;padding:48px 20px;}
.reasons-head{text-align:center;font-size:32px;font-weight:900;line-height:1.15;color:#111;}
.reasons-head .big{background:var(--g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.reasons-sub{text-align:center;font-size:20px;font-weight:900;margin:8px 0 28px;color:#444;}
.rcard{
  background:#fff;border:1px solid var(--border);
  border-radius:14px;overflow:hidden;margin-bottom:18px;
  box-shadow:0 2px 12px rgba(255,98,0,.07);
}
.rcard-hd{background:var(--g);padding:7px 16px;font-size:13px;font-weight:700;letter-spacing:.08em;color:#fff;}
.rcard-body{padding:16px;display:grid;grid-template-columns:1fr 80px;gap:12px;align-items:start;}
.rcard-title{font-size:16px;font-weight:900;line-height:1.4;margin-bottom:7px;color:#111;}
.rcard-title span{background:var(--g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.rcard-desc{font-size:12px;color:#666;line-height:1.75;}
.rcard-img{
  background:rgba(255,98,0,.07);border:1px solid rgba(255,98,0,.18);
  border-radius:8px;height:90px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
}

/* ====== CURRICULUM ====== */
.curriculum{background:#f8f8f8;padding:48px 20px;}
.curri-head{text-align:center;margin-bottom:24px;}
.curri-badge{
  display:inline-block;background:var(--g);color:#fff;
  font-size:11px;font-weight:700;padding:3px 14px;border-radius:20px;margin-bottom:10px;
}
.curri-title{font-size:26px;font-weight:900;line-height:1.3;color:#111;}
.curri-title .ac{background:var(--g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.curri-squeeze{text-align:center;font-size:18px;font-weight:900;margin-bottom:24px;color:#111;}
.curri-squeeze .big{font-size:40px;background:var(--g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.curri-items{display:flex;flex-direction:column;gap:10px;}
.curri-item{
  display:flex;gap:12px;align-items:flex-start;
  background:#fff;border:1px solid rgba(255,98,0,.18);
  border-radius:10px;padding:13px;
}
.cnum{
  background:var(--g);color:#fff;font-size:12px;font-weight:900;
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.ctext{font-size:14px;line-height:1.65;color:#333;}

/* ====== 3 STEP ====== */
.steps{background:#ffffff;padding:48px 20px;}
.step-title{text-align:center;font-size:24px;font-weight:900;margin-bottom:28px;line-height:1.3;color:#111;}
.step-title .big{font-size:36px;background:var(--g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.scard{
  background:#fff;border:1px solid var(--border);
  border-radius:12px;padding:18px;display:flex;gap:14px;align-items:center;
  margin-bottom:10px;box-shadow:0 2px 10px rgba(255,98,0,.06);
}
.snum{
  width:48px;height:48px;flex-shrink:0;background:var(--g);border-radius:50%;color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;line-height:1.3;text-align:center;
}
.scon-title{font-size:16px;font-weight:900;margin-bottom:4px;color:#111;}
.scon-desc{font-size:13px;color:#666;line-height:1.6;}
.sconnector{text-align:center;color:rgba(255,98,0,.45);font-size:22px;margin-bottom:10px;}
.step-note{text-align:center;font-size:13px;color:#666;margin-top:20px;line-height:1.9;}
.step-note span{background:var(--g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:700;}

/* ====== 5 FEATURES ====== */
.features{background:#f8f8f8;padding:48px 20px;}
.feat-bg{font-size:56px;font-weight:900;color:rgba(0,0,0,.03);text-align:center;line-height:1;margin-bottom:-16px;letter-spacing:.15em;}
.feat-title{font-size:24px;font-weight:900;text-align:center;margin-bottom:28px;line-height:1.35;position:relative;color:#111;}
.feat-title span{background:var(--g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.feat-cards{display:flex;flex-direction:column;gap:10px;}
.fcard{
  background:#fff;
  border:1px solid var(--border);border-radius:12px;
  padding:14px 18px;display:flex;gap:14px;align-items:flex-start;
  position:relative;overflow:hidden;
  box-shadow:0 2px 10px rgba(255,98,0,.06);
}
.fcard::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--g);}
.fnum-wrap{flex-shrink:0;text-align:center;}
.feyebrow{font-size:9px;color:#999;white-space:nowrap;}
.fnum{font-size:44px;font-weight:900;line-height:1;background:var(--g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.fcon-eye{font-size:10px;background:var(--g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:700;margin-bottom:3px;}
.fcon-title{font-size:15px;font-weight:900;line-height:1.4;color:#111;}

/* ====== INSTRUCTOR ====== */
.instructor{background:#ffffff;padding:48px 20px;}
.instr-title{
  background:var(--g);color:#fff;font-size:17px;font-weight:900;
  padding:10px 20px;border-radius:8px;margin-bottom:22px;text-align:center;
}
.instr-bio{font-size:14px;line-height:1.95;color:#444;margin-bottom:28px;}
.instr-strength-head{
  font-size:15px;font-weight:900;padding:10px 16px;
  background:var(--g);color:#fff;border-radius:8px;margin-bottom:14px;
}
.istrength-item{margin-bottom:16px;}
.ist-title{font-size:18px;font-weight:900;background:var(--g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.ist-desc{font-size:13px;color:#666;line-height:1.7;padding-bottom:16px;border-bottom:1px solid rgba(255,98,0,.12);}
.istrength-item:last-child .ist-desc{border-bottom:none;}

/* ====== FAQ ====== */
.faq{background:#f8f8f8;padding:48px 20px;}
.faq-bg{font-size:72px;font-weight:900;color:rgba(0,0,0,.025);text-align:center;line-height:1;margin-bottom:-24px;}
.faq-title{font-size:28px;font-weight:900;text-align:center;margin-bottom:32px;position:relative;color:#111;}
.faq-item{margin-bottom:24px;}
.faq-q{
  background:var(--g);border-radius:50px;padding:11px 18px;color:#fff;
  font-size:14px;font-weight:700;display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.fqicon{font-style:italic;font-size:18px;font-weight:900;flex-shrink:0;}
.faq-a{padding:0 6px;font-size:14px;line-height:1.95;color:#444;}
.faq-a p+p{margin-top:12px;}

/* ====== HOW TO (3STEP登録) ====== */
.howto{background:#ffffff;padding:48px 20px;}
.howto-small{text-align:center;font-size:13px;color:rgba(0,0,0,.45);margin-bottom:8px;}
.howto-title{text-align:center;font-size:26px;font-weight:900;margin-bottom:28px;line-height:1.3;color:#111;}
.howto-title .big{font-size:36px;background:var(--g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.how-steps{
  background:#fff;border:1px solid var(--border);border-radius:16px;
  padding:22px 16px;display:flex;align-items:center;justify-content:space-around;
  gap:6px;margin-bottom:28px;
  box-shadow:0 2px 12px rgba(255,98,0,.07);
}
.hstep{flex:1;text-align:center;}
.hnum{
  width:34px;height:34px;background:var(--g);border-radius:50%;color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:15px;margin:0 auto 7px;
}
.hicon{font-size:28px;margin-bottom:6px;}
.htext{font-size:11px;line-height:1.45;color:#555;}
.harrow{color:rgba(255,98,0,.45);font-size:20px;}

/* ====== BOTTOM CTA ====== */
.btm-cta{background:#f5f5f5;padding:36px 20px;}
.btm-title{font-size:15px;color:#333;text-align:center;margin-bottom:20px;line-height:1.75;}
.btm-title strong{color:var(--orange);text-decoration:underline;}
.btm-notes{font-size:11px;color:#999;margin-top:18px;line-height:2.1;}

/* ====== SERVICE ====== */
.service{background:#ffffff;padding:48px 20px;}
.svc-title{
  background:var(--g);color:#fff;font-size:14px;font-weight:700;
  padding:8px 20px;border-radius:8px;text-align:center;margin-bottom:20px;
}
.svc-name{text-align:center;font-size:20px;font-weight:900;margin-bottom:22px;line-height:1.45;color:#111;}
.svc-table{border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.svc-row{display:grid;grid-template-columns:2fr 3fr;border-bottom:1px solid rgba(255,98,0,.1);}
.svc-row:last-child{border-bottom:none;}
.svc-label{font-size:12px;color:#888;padding:13px 14px;border-right:1px solid rgba(255,98,0,.1);background:rgba(255,98,0,.04);}
.svc-val{font-size:14px;font-weight:700;padding:13px 14px;color:#333;}

/* ====== FIXED BOTTOM CTA ====== */
.fixed-cta{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  padding:0;
  background:none;
  border:none;
  box-shadow:none;
  z-index:999;
}
@keyframes shimmer{
  0%{background-position:200% center;}
  100%{background-position:-200% center;}
}
@keyframes ctapulse{
  0%,100%{box-shadow:0 0 0 0 rgba(255,80,0,.5);}
  50%{box-shadow:0 0 0 8px rgba(255,80,0,.0);}
}
.fixed-cta .btn-line{
  font-size:17px;padding:18px 24px;border-radius:20px 20px 0 0;
  background:linear-gradient(90deg,#ff3500 0%,#ff9500 40%,#ffcc44 60%,#ff9500 80%,#ff3500 100%);
  background-size:200% auto;
  animation:shimmer 2.5s linear infinite, ctapulse 2s ease-in-out infinite;
  box-shadow:none;
}

/* ====== COMPANY ====== */
.company{background:#f8f8f8;padding:48px 20px;position:relative;overflow:hidden;}
.company::before{
  content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,98,0,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,98,0,.04) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;
}
.company-eyebrow{
  text-align:center;font-size:11px;font-weight:700;letter-spacing:.15em;
  color:var(--orange);margin-bottom:6px;position:relative;
}
.company-title{
  font-size:26px;font-weight:900;text-align:center;
  color:#111;margin-bottom:24px;position:relative;line-height:1.2;
}
.company-title span{background:var(--g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.company-card{
  background:#fff;border:1.5px solid var(--border);
  border-radius:12px;overflow:hidden;position:relative;
  box-shadow:0 2px 20px rgba(255,98,0,.08);margin-bottom:16px;
}
.company-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--gh);
}
.company-row{
  display:grid;grid-template-columns:80px 1fr;
  border-bottom:1px solid rgba(255,98,0,.1);
}
.company-row:last-child{border-bottom:none;}
.company-label{
  font-size:11px;font-weight:700;color:var(--orange);
  padding:13px 12px;
  border-right:1px solid rgba(255,98,0,.1);
  background:rgba(255,98,0,.04);
  display:flex;align-items:center;
}
.company-val{
  font-size:14px;font-weight:700;color:#111;
  padding:13px 14px;display:flex;align-items:center;
}
.company-photo{
  width:100%;height:160px;background:#f0f0f0;
  border:1.5px solid var(--border);border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  color:rgba(0,0,0,.3);font-size:13px;position:relative;overflow:hidden;
}
.company-photo::before{
  content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,98,0,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(255,98,0,.06) 1px,transparent 1px);
  background-size:20px 20px;
}

/* ====== FOOTER ====== */
footer{
  background:#111111;padding:24px 20px;text-align:center;
  font-size:12px;color:rgba(255,255,255,.4);
  border-top:3px solid var(--orange);
}
footer a{color:rgba(255,255,255,.45);}

/* ====== SIDE FX ====== */
body{background:#0a0a0a;}
.side-fx{
  position:fixed;inset:0;pointer-events:none;z-index:1000;overflow:hidden;
}
.sfx{position:absolute;top:0;bottom:0;overflow:hidden;}
.sfx-l{left:0;right:calc(50% + 240px);}
.sfx-r{right:0;left:calc(50% + 240px);}

@keyframes sfxScan{
  0%{top:100%;}100%{top:-2px;}
}
@keyframes sfxFloat{
  0%{bottom:-10px;opacity:0;}
  15%{opacity:.9;}85%{opacity:.3;}
  100%{bottom:105%;opacity:0;}
}
@keyframes sfxLinePulse{
  0%,100%{opacity:.12;}50%{opacity:.6;}
}
@keyframes sfxGlow{
  0%,100%{opacity:.3;}50%{opacity:.7;}
}

.sfx-scan{
  position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 0%,#ff6200 50%,transparent 100%);
  box-shadow:0 0 12px 4px rgba(255,98,0,.5);
  animation:sfxScan 5s linear infinite;
}
.sfx-r .sfx-scan{animation-delay:-2.5s;}

.sfx-dot{
  position:absolute;width:3px;height:3px;
  background:#ff6200;border-radius:50%;
  box-shadow:0 0 8px 3px rgba(255,98,0,.7);
  animation:sfxFloat linear infinite;
}
.sfx-d1{left:20%;animation-duration:9s;animation-delay:0s;}
.sfx-d2{left:55%;animation-duration:6s;animation-delay:-2s;}
.sfx-d3{left:75%;animation-duration:11s;animation-delay:-5s;}
.sfx-d4{left:38%;animation-duration:7.5s;animation-delay:-3.5s;}

.sfx-hline{
  position:absolute;height:1px;
  animation:sfxLinePulse 3s ease-in-out infinite;
}
.sfx-l .sfx-hline{
  right:0;
  background:linear-gradient(270deg,rgba(255,98,0,.75) 0%,transparent 100%);
}
.sfx-r .sfx-hline{
  left:0;
  background:linear-gradient(90deg,rgba(255,98,0,.75) 0%,transparent 100%);
}
.sfx-h1{width:75%;top:12%;animation-delay:0s;}
.sfx-h2{width:50%;top:28%;animation-delay:-1s;}
.sfx-h3{width:85%;top:47%;animation-delay:-2s;}
.sfx-h4{width:60%;top:66%;animation-delay:-.5s;}
.sfx-h5{width:70%;top:82%;animation-delay:-1.5s;}
.sfx-h6{width:40%;top:93%;animation-delay:-.8s;}

.sfx-glow{
  position:absolute;
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,98,0,.15) 0%,transparent 70%);
  animation:sfxGlow 4s ease-in-out infinite;
}
.sfx-g1{width:160px;height:160px;top:20%;left:-40px;animation-delay:0s;}
.sfx-g2{width:120px;height:120px;top:60%;right:-20px;animation-delay:-2s;}
.sfx-r .sfx-g1{left:auto;right:-40px;}
.sfx-r .sfx-g2{right:auto;left:-20px;}

@keyframes sfxScanMobile{
  0%{top:-80px;}100%{top:100%;}
}
@media(max-width:540px){
  .sfx-l{left:0;right:calc(100% - 5px);}
  .sfx-r{right:0;left:calc(100% - 5px);}
  .sfx-dot,.sfx-hline,.sfx-glow{display:none;}
  .sfx{background:rgba(255,98,0,.04);}
  .sfx-scan{
    height:100px;left:0;right:0;
    background:linear-gradient(180deg,transparent,rgba(255,98,0,.9),transparent);
    box-shadow:0 0 12px 4px rgba(255,98,0,.6);
    animation:sfxScanMobile 4s linear infinite;
  }
  .sfx-r .sfx-scan{animation-delay:-2s;}
}
</style>
</head>
